<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Landing Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <div class="logo">Gynger</div>

        <ul>
            <li><a href="#">Products</a></li>
            <li><a href="#">Resources</a></li>
            <li><a href="#">Company</a></li>
        </ul>

        <button class="login-btn">Login</button>
    </nav>

    <section class="hero">
        <h1>Tech payments<br>on your terms</h1>

        <p>
            The first AI-powered payments platform with embedded
            financing built for buyers and sellers of technology.
        </p>

        <div class="buttons">
            <button class="signup">Sign Up</button>
            <button class="sales">Talk to Sales</button>
        </div>
    </section>

    <section class="card">
        <h3>Available Capital</h3>
        <h1>$1,000,000</h1>

        <div class="offers">
            <div class="offer">AWS</div>
            <div class="offer">Okta</div>
            <div class="offer">Braze</div>
        </div>
    </section>

    <section class="logos">
        <span>Firebase</span>
        <span>Cloudflare</span>
        <span>Slack</span>
        <span>Google Cloud</span>
    </section>

</body>
</html>
